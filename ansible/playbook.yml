---
- name: Deploy Node.js Application with PM2 and Nginx
  hosts: nodejs
  become: yes
  vars:
    nodejs_version: "20"
    app_name: "myapp"
    app_port: 3000
    app_user: "nodejs"
    app_dir: "/opt/{{ app_name }}"
    pm2_instances: "max"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - git
        state: present

    - name: Add NodeSource GPG key
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg --yes

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash
        home: "/home/{{ app_user }}"
        create_home: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create sample Node.js application
      copy:
        content: |
          const http = require('http');
          const os = require('os');

          const PORT = process.env.PORT || {{ app_port }};

          const server = http.createServer((req, res) => {
            const response = {
              message: 'Hello from Node.js!',
              hostname: os.hostname(),
              pid: process.pid,
              uptime: process.uptime(),
              timestamp: new Date().toISOString(),
              path: req.url,
              method: req.method
            };

            res.writeHead(200, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify(response, null, 2));
          });

          server.listen(PORT, () => {
            console.log(`Server running on port ${PORT} (PID: ${process.pid})`);
          });

          process.on('SIGINT', () => {
            console.log('Shutting down gracefully...');
            server.close(() => process.exit(0));
          });
        dest: "{{ app_dir }}/app.js"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Create package.json
      copy:
        content: |
          {
            "name": "{{ app_name }}",
            "version": "1.0.0",
            "description": "Sample Node.js application",
            "main": "app.js",
            "scripts": {
              "start": "node app.js"
            },
            "engines": {
              "node": ">={{ nodejs_version }}.0.0"
            }
          }
        dest: "{{ app_dir }}/package.json"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Create PM2 ecosystem config
      template:
        src: ecosystem.config.js.j2
        dest: "{{ app_dir }}/ecosystem.config.js"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Configure Nginx reverse proxy
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}
        mode: '0644'
      notify: Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/{{ app_name }}
        dest: /etc/nginx/sites-enabled/{{ app_name }}
        state: link
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Start Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Setup PM2 startup script
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}
      args:
        creates: /etc/systemd/system/pm2-{{ app_user }}.service

    - name: Start application with PM2
      shell: |
        su - {{ app_user }} -c "cd {{ app_dir }} && pm2 start ecosystem.config.js"
      args:
        creates: "/home/{{ app_user }}/.pm2/pids/{{ app_name }}-0.pid"

    - name: Save PM2 process list
      shell: su - {{ app_user }} -c "pm2 save"
      changed_when: false

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        delay: 2
        timeout: 30

    - name: Verify application is responding
      uri:
        url: "http://localhost:{{ app_port }}"
        return_content: yes
      register: app_response
      retries: 3
      delay: 5

    - name: Display deployment info
      debug:
        msg: |
          ================================================
          Node.js Application Deployed!
          ================================================
          App URL: http://{{ ansible_host }}
          App Directory: {{ app_dir }}
          PM2 Instances: {{ pm2_instances }}
          Node.js Version: {{ nodejs_version }}

          Useful Commands (as {{ app_user }}):
            pm2 status          - View process status
            pm2 logs            - View application logs
            pm2 reload all      - Zero-downtime reload
            pm2 restart all     - Restart all processes
            pm2 monit           - Monitor processes

          Nginx Commands:
            sudo systemctl status nginx
            sudo nginx -t       - Test configuration
            sudo systemctl reload nginx
          ================================================

  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: restarted
